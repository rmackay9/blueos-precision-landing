# Debug Docker Compose file for testing camera access
# Use this for local testing: docker-compose -f docker-compose-debug.yml up
version: '3.8'

services:
  precision-landing:
    build: .
    ports:
      - "8000:8000"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    devices:
      - /dev/video0:/dev/video0  # If using USB camera
      - /dev/video1:/dev/video1  # Additional video devices if needed
    volumes:
      - ./settings:/app/settings
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
